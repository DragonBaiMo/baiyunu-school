name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Typecheck + Test + Build
        run: |
          pnpm turbo run typecheck
          pnpm turbo run test
          pnpm turbo run build --filter=!@bynu/alumni-miniapp

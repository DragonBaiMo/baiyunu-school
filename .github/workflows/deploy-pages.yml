name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build design-tokens
        run: pnpm --filter @bynu/design-tokens build

      - name: Build alumni-h5
        run: pnpm --filter @bynu/alumni-h5 build

      - name: Build admin-web
        run: pnpm --filter @bynu/admin-web build

      - name: Combine outputs
        run: |
          mkdir -p _site
          cp -r apps/alumni-h5/dist/* _site/
          mkdir -p _site/admin
          cp -r apps/admin-web/dist/* _site/admin/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
